# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  - board: nice_nano_v2
    shield: corne_left
    snippet: studio-rpc-usb-uart
  - board: nice_nano_v2
    shield: corne_right
  - board: nice_nano_v2
    shield: settings_reset
  # Temporary logging build for hold-tap timing analysis (see zmk-holdtap-tuner).
  # Flash this onto the central (left) half, capture over USB with tio, then
  # reflash the normal corne_left firmware. Requires config/west.yml to point at
  # the toberndo/zmk fork branch that contains CONFIG_ZMK_EVENT_CSV_LOG.
  - board: nice_nano_v2
    shield: corne_left
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_EVENT_CSV_LOG=y -DCONFIG_ZMK_LOGGING_MINIMAL=y
    artifact-name: corne_left_csvlog
